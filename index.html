<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>THASSOS IMPERIAL · Αποθήκη με Drag & Drop</title>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f9ff;-webkit-tap-highlight-color:transparent;}
    header{background:#1e3a5f;color:white;padding:10px 12px;text-align:center;position:sticky;top:0;z-index:20;box-shadow:0 2px 10px rgba(0,0,0,.1);}
    header h1{font-size:1.2rem;font-weight:600;letter-spacing:.5px;}
    .tabs-container{display:flex;align-items:center;background:white;border-bottom:2px solid #1e3a5f;position:sticky;top:48px;z-index:19;}
    .tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;flex:1;}
    .tab{flex:1 0 auto;padding:10px 14px;text-align:center;font-weight:600;color:#1e3a5f;cursor:pointer;background:#eef4ff;border-right:1px solid #cdddec;font-size:13px;user-select:none;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;gap:2px;}
    .tab:last-child{border-right:none;}
    .tab.active{background:#1e3a5f;color:white;}
    .tab-badge{font-size:10px;font-weight:700;background:#f59e0b;color:white;border-radius:30px;padding:1px 7px;}
    .tab.active .tab-badge{background:#fbbf24;color:#1e3a5f;}
    .tab-badge.zero{background:#cbd5e1;color:#64748b;}
    .tab.active .tab-badge.zero{background:#93a3b8;color:white;}
    .manage-cats-btn{background:white;border:none;font-size:20px;padding:0 12px;cursor:pointer;color:#1e3a5f;border-left:1px solid #cdddec;height:100%;display:flex;align-items:center;touch-action:manipulation;}
    .search-section{background:white;padding:8px 12px 10px;box-shadow:0 2px 5px rgba(0,0,0,.05);position:sticky;top:96px;z-index:18;}
    #search{width:100%;padding:10px 14px;font-size:14px;border:1.5px solid #d0ddeb;border-radius:30px;outline:none;background:#fafcff;}
    #search:focus{border-color:#1e3a5f;background:white;}
    .action-bar{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
    .action-bar button{flex:1 0 calc(20% - 5px);padding:8px 0;background:#2563eb;color:white;border:none;border-radius:30px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;touch-action:manipulation;}
    .btn-save{background:#15803d!important;}
    .btn-pdf{background:#0b3b5c!important;}
    .btn-clear{background:#b91c1c!important;}
    .btn-del2{background:#6b4f3c!important;}
    .btn-filter{background:#059669!important;}
    .btn-filter.active{background:#065f46!important;box-shadow:0 0 0 2px #6ee7b7;}
    .toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);background:#15803d;color:white;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:500;pointer-events:none;white-space:nowrap;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .stats-bar{display:flex;gap:6px;padding:6px 10px 2px;overflow-x:auto;}
    .stat-chip{background:white;border:1px solid #d1e3f3;border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;color:#1e3a5f;white-space:nowrap;flex-shrink:0;}
    .stat-chip span{color:#2563eb;}
    .tab-content{padding:8px 10px 80px;}
    .tab-pane{display:none;}
    .tab-pane.active{display:block;}
    /* Product styles with drag handle */
    .product{background:white;margin:8px 0;padding:10px;border-radius:18px;box-shadow:0 2px 6px rgba(0,0,0,.03);border:1px solid #e2edf7;transition:background .2s;}
    .product.has-qty{border-left:4px solid #22c55e;}
    .product.dup-warn{border-left:5px solid #e53e3e;}
    .product.dup-alert{background:#fff5f5;border-color:#fc8181;border-left:5px solid #c53030;}
    .product-header{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
    .drag-handle{font-size:22px;color:#6b8aaf;cursor:grab;user-select:none;touch-action:none;padding:0 4px 0 0;display:inline-flex;align-items:center;}
    .drag-handle:active{cursor:grabbing;}
    .thumb-wrap{position:relative;width:56px;height:56px;flex-shrink:0;}
    .product-thumb{width:56px;height:56px;border-radius:12px;object-fit:cover;border:1.5px solid #e2edf7;cursor:pointer;display:block;}
    .thumb-del{position:absolute;top:-5px;right:-5px;width:20px;height:20px;border-radius:50%;background:#e53e3e;color:white;border:2px solid white;font-size:10px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
    .product-thumb-ph{width:56px;height:56px;border-radius:12px;flex-shrink:0;border:2px dashed #c5d8ea;background:#f0f5fa;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:2px;color:#7e9ab5;font-size:10px;font-weight:600;text-align:center;transition:background .15s;}
    .product-thumb-ph:active{background:#dbeafe;}
    .ph-ico{font-size:22px;line-height:1;}
    .file-inp{display:none;}
    .product-name{font-weight:700;font-size:14px;color:#0f2a44;flex:1;word-break:break-word;line-height:1.2;}
    .dup-icon{font-size:15px;margin-left:3px;color:#e53e3e;}
    .product-actions{display:flex;gap:2px;flex-shrink:0;}
    .btn-edit,.btn-trash{background:none;border:none;font-size:16px;cursor:pointer;padding:6px;color:#7e9ab5;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
    .product-controls{display:flex;gap:10px;justify-content:space-around;}
    .qty-item{flex:1;display:flex;flex-direction:column;align-items:center;}
    .qty-label{display:flex;align-items:center;gap:2px;font-size:11px;font-weight:600;color:#1e3a5f;margin-bottom:3px;text-transform:uppercase;cursor:pointer;}
    .qty-label span{border-bottom:1px dashed #1e3a5f;}
    .qty-ctrl{display:flex;align-items:center;gap:2px;background:#f0f5fa;padding:2px;border-radius:30px;width:100%;max-width:150px;justify-content:center;}
    .qty-ctrl button{width:40px;height:40px;border-radius:50%;border:none;background:#1e3a5f;color:white;font-size:20px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 4px rgba(0,0,0,.1);touch-action:manipulation;}
    .qty-ctrl input{width:50px;text-align:center;font-size:14px;font-weight:700;border:1px solid #bdd3e8;border-radius:30px;padding:6px 0;background:white;-moz-appearance:textfield;}
    .qty-ctrl input::-webkit-outer-spin-button,.qty-ctrl input::-webkit-inner-spin-button{-webkit-appearance:none;}
    @keyframes fg{0%{background:#bbf7d0}100%{background:white}}
    @keyframes fr{0%{background:#fee2e2}100%{background:white}}
    .flash-up{animation:fg .4s ease;}
    .flash-dn{animation:fr .4s ease;}
    #scrollBtn{position:fixed;bottom:16px;right:16px;width:44px;height:44px;border-radius:50%;background:#1e3a5f;color:white;border:none;box-shadow:0 4px 12px rgba(0,0,0,.2);font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:100;opacity:0;transform:scale(.9);pointer-events:none;transition:opacity .2s,transform .2s;}
    #scrollBtn.vis{opacity:1;transform:scale(1);pointer-events:auto;}
    .no-results{text-align:center;padding:25px;color:#5f7d9c;font-style:italic;background:white;border-radius:20px;margin-top:16px;}
    .footer-note{text-align:center;font-size:11px;color:#6f8fae;padding:12px;}
    .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:2000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
    .overlay.open{display:flex;}
    .overlay img{max-width:90%;max-height:70vh;border-radius:16px;object-fit:contain;}
    .ov-name{color:white;font-size:16px;font-weight:700;text-align:center;padding:0 20px;}
    .ov-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
    .ov-btns button{padding:10px 20px;border:none;border-radius:30px;font-weight:700;font-size:14px;cursor:pointer;}
    .ov-change{background:#2563eb;color:white;}
    .ov-remove{background:#b91c1c;color:white;}
    .ov-close{background:#e2edf7;color:#1e3a5f;}
    .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:1000;}
    .modal.open{display:flex;}
    .modal-box{background:white;border-radius:20px;padding:20px 16px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 35px rgba(0,0,0,.2);}
    .modal-box h3{margin:0 0 16px;color:#1e3a5f;text-align:center;font-weight:700;font-size:18px;}
    .modal-box input{padding:12px 14px;margin:6px 0;background:#f4f9ff;border:1px solid #cbdbe9;border-radius:30px;font-size:15px;width:100%;outline:none;}
    .btn-primary{margin-top:12px;padding:12px;width:100%;background:#1e3a5f;color:white;border:none;border-radius:30px;font-weight:bold;font-size:15px;cursor:pointer;touch-action:manipulation;display:block;}
    .unit-opt{padding:12px;margin:4px 0;background:#f0f5fa;border-radius:30px;text-align:center;font-weight:600;cursor:pointer;}
    .unit-opt:hover,.unit-opt:active{background:#1e3a5f;color:white;}
    .del-item{background:#fef9ec;margin:6px 0;padding:8px;border-radius:16px;display:flex;justify-content:space-between;align-items:center;gap:4px;font-size:13px;}
    .btn-restore{border:none;border-radius:20px;background:#15803d;color:white;cursor:pointer;font-weight:bold;padding:5px 8px;font-size:13px;}
    .btn-perm{border:none;border-radius:20px;background:#b91c1c;color:white;cursor:pointer;font-weight:bold;padding:5px 8px;font-size:13px;margin-left:4px;}
    .cat-item{display:flex;align-items:center;justify-content:space-between;padding:10px;background:#f0f7ff;border-radius:14px;margin-bottom:6px;}
    .cat-name{font-weight:600;color:#1e3a5f;font-size:15px;}
    .cat-actions button{background:none;border:none;font-size:22px;margin-left:8px;cursor:pointer;padding:4px;}
    @media(max-width:360px){.action-bar button{font-size:10px;padding:7px 0;}.tab{padding:9px 10px;font-size:12px;}}
  </style>
</head>
<body>

<div class="toast" id="toast"></div>
<button id="scrollBtn" class="">⬆️</button>
<header><h1>THASSOS IMPERIAL</h1></header>

<div class="tabs-container">
  <div class="tabs" id="tabsEl"></div>
  <button class="manage-cats-btn" onclick="openCatMgr()">📋</button>
</div>

<div class="search-section">
  <input type="text" id="search" placeholder="🔍 Αναζήτηση..." oninput="filterTab()">
  <div class="action-bar">
    <button class="btn-save" onclick="saveToFile()">💾 Αρχείο</button>
    <button class="btn-pdf" onclick="exportPDF()">📄 PDF</button>
    <button onclick="openAddModal()">➕ Νέο</button>
    <button class="btn-clear" id="clearBtn" onclick="clearCatQty()">🧹 Μηδέν</button>
    <button class="btn-filter" id="filterBtn" onclick="toggleFilter()">📦 Με ποσ.</button>
    <button class="btn-del2" onclick="showDeletedModal()">🗑️ Διεγρ.</button>
  </div>
</div>

<input type="file" id="fileInp" class="file-inp" accept="image/*">

<div class="stats-bar" id="statsBar"></div>
<div class="tab-content" id="tabContent"></div>
<div class="footer-note">THASSOS IMPERIAL · Σύρετε προϊόντα για ταξινόμηση</div>

<!-- Image overlay -->
<div id="imgOv" class="overlay" onclick="closeImgOv(event)">
  <div class="ov-name" id="ovName"></div>
  <img id="ovImg" src="" alt="">
  <div class="ov-btns" onclick="event.stopPropagation()">
    <button class="ov-change" onclick="ovChangePhoto()">📷 Αλλαγή</button>
    <button class="ov-remove" onclick="ovRemove()">🗑️ Αφαίρεση</button>
    <button class="ov-close" onclick="closeImgOv()">✕ Κλείσιμο</button>
  </div>
</div>

<!-- Modals -->
<div id="unitModal" class="modal" onclick="closeMod('unitModal',event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h3>Επιλογή μονάδας</h3>
    <div class="unit-opt" data-unit="pieces">📦 Τεμάχια</div>
    <div class="unit-opt" data-unit="kg">⚖️ Κιλά</div>
    <div class="unit-opt" data-unit="pallet">🏗️ Παλέτα</div>
  </div>
</div>
<div id="addModal" class="modal" onclick="closeMod('addModal',event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h3>➕ Νέο προϊόν</h3>
    <input type="text" id="newName" placeholder="Όνομα προϊόντος" autocomplete="off" oninput="checkDup()">
    <div id="dupWarn" style="color:red;font-size:12px;margin-top:4px;min-height:16px;"></div>
    <button class="btn-primary" onclick="addProduct()">Προσθήκη</button>
  </div>
</div>
<div id="editModal" class="modal" onclick="closeMod('editModal',event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h3>✏️ Επεξεργασία</h3>
    <input type="text" id="editName" placeholder="Νέο όνομα">
    <button class="btn-primary" onclick="saveEdit()">Αποθήκευση</button>
  </div>
</div>
<div id="deletedModal" class="modal" onclick="closeMod('deletedModal',event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h3>🗑️ Διεγραμμένα</h3>
    <div id="delList"></div>
    <button class="btn-primary" onclick="closeMod('deletedModal')">Κλείσιμο</button>
  </div>
</div>
<div id="catModal" class="modal" onclick="closeMod('catModal',event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h3>📂 Κατηγορίες</h3>
    <div id="catList"></div>
    <div style="display:flex;gap:6px;margin-top:10px;">
      <input type="text" id="newCatName" placeholder="Νέα κατηγορία" style="flex:2;">
      <button class="btn-primary" style="flex:1;margin-top:0;" onclick="addCategory()">➕</button>
    </div>
    <button class="btn-primary" onclick="closeMod('catModal')" style="margin-top:12px;">Κλείσιμο</button>
  </div>
</div>

// ─── Βοηθητικές συναρτήσεις ─────────────────────────────────
function esc(s){return String(s).replace(/[&<>"']/g,function(m){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m];});}
function q(id){return document.getElementById(id);}
function openMod(id){q(id).classList.add('open');}
function closeMod(id,e){if(!e||e.target.id===id)q(id).classList.remove('open');}
function showToast(msg){var t=q('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

let cats = [], activeId = null;
let sortableInstances = {};
let filterQty = false;
let pendUnit = null, pendEdit = null, ovCtx = null, pendPhoto = null;
const SK = 'thassos_v8'; // νέο κλειδί

// ─── Δημιουργία νέου προϊόντος ────────────────────────────
function mkProduct(name, su = "pieces") {
  return { name, boxes: 0, sv: 0, su: su, img: "" };
}

// ─── Συγχώνευση τρέχουσας αποθήκης με το MASTER (προσθήκη νέων, διαγραφή όσων λείπουν, κράτηση φωτογραφιών/ποσοτήτων) ───
function syncWithMaster(currentCats, master) {
  const newCats = [];
  for (const masterCat of master) {
    let existingCat = currentCats.find(c => c.name === masterCat.name);
    let oldProductsMap = new Map();
    if (existingCat) {
      existingCat.products.forEach(p => oldProductsMap.set(p.name, p));
    }
    const newProducts = [];
    for (const mp of masterCat.products) {
      const oldProd = oldProductsMap.get(mp.name);
      if (oldProd) {
        // Κρατάμε παλιά boxes, sv, img, αλλά ενημερώνουμε su από το master (σε περίπτωση αλλαγής μονάδας)
        newProducts.push({
          name: mp.name,
          boxes: oldProd.boxes || 0,
          sv: oldProd.sv || 0,
          su: mp.su || "pieces",
          img: oldProd.img || ""
        });
      } else {
        newProducts.push(mkProduct(mp.name, mp.su || "pieces"));
      }
    }
    newCats.push({
      id: existingCat ? existingCat.id : ('c' + Date.now() + '_' + Math.random()),
      name: masterCat.name,
      products: newProducts,
      deleted: existingCat ? (existingCat.deleted || []) : []
    });
  }
  return newCats;
}

// ─── Φόρτωση / Αποθήκευση ──────────────────────────────────
function load() {
  let stored = null;
  try {
    const raw = localStorage.getItem(SK);
    if (raw) stored = JSON.parse(raw);
  } catch(e) { /* ignore */ }
  if (stored && Array.isArray(stored) && stored.length) {
    cats = stored;
    // Εξασφάλιση πεδίων
    cats.forEach(c => {
      if (!c.deleted) c.deleted = [];
      c.products.forEach(p => { if (p.img === undefined) p.img = ''; if (p.sv === undefined) p.sv = 0; if (!p.su) p.su = 'pieces'; });
    });
    // Συγχώνευση με master (για τυχόν νέα προϊόντα από την ενημέρωση)
    cats = syncWithMaster(cats, MASTER_CATEGORIES);
  } else {
    // Πρώτη φορά – δημιουργία από master
    cats = MASTER_CATEGORIES.map((mc, idx) => ({
      id: 'c' + Date.now() + '_' + idx,
      name: mc.name,
      products: mc.products.map(p => mkProduct(p.name, p.su || "pieces")),
      deleted: []
    }));
  }
  // Αποθήκευση μετά το sync
  save();
}
function save() {
  try { localStorage.setItem(SK, JSON.stringify(cats)); } catch(e) { /* */ }
}

// ─── UI: Tabs, Badges ──────────────────────────────────────
function catStats(c) {
  const wq = c.products.filter(p => p.boxes > 0 || p.sv > 0).length;
  const total = c.products.length;
  const tb = c.products.reduce((s,p) => s + (p.boxes || 0), 0);
  const wi = c.products.filter(p => p.img).length;
  return { wq, total, tb, wi };
}
function renderTabs() {
  q('tabsEl').innerHTML = cats.map(c => {
    const s = catStats(c);
    return `<div class="tab${c.id === activeId ? ' active' : ''}" onclick="switchCat('${c.id}')">${esc(c.name)}<span class="tab-badge${s.wq === 0 ? ' zero' : ''}">${s.wq}</span></div>`;
  }).join('');
  const ac = cats.find(c => c.id === activeId);
  if (ac) q('clearBtn').textContent = '🧹 Μηδέν';
}
function renderStats() {
  const c = cats.find(c => c.id === activeId);
  if (!c) return;
  const s = catStats(c);
  q('statsBar').innerHTML = `<div class="stat-chip">Σύνολο: <span>${s.total}</span></div>
    <div class="stat-chip">Με ποσ/τα: <span>${s.wq}</span></div>
    <div class="stat-chip">Κιβώτια: <span>${s.tb}</span></div>
    <div class="stat-chip">Με φωτό: <span>${s.wi}</span></div>`;
}
function renderContent() {
  q('tabContent').innerHTML = cats.map(c => `<div id="pane_${c.id}" class="tab-pane${c.id === activeId ? ' active' : ''}"><div id="list_${c.id}"></div></div>`).join('');
}

// ─── Render προϊόντων με drag handle και Sortable ──────────
function renderProducts(ft = '') {
  const c = cats.find(c => c.id === activeId);
  if (!c) return;
  const el = q('list_' + c.id);
  if (!el) return;
  const term = ft.trim().toLowerCase();
  let filtered = c.products.slice();
  if (term) filtered = filtered.filter(p => p.name.toLowerCase().includes(term));
  if (filterQty) filtered = filtered.filter(p => p.boxes > 0 || p.sv > 0);
  if (!filtered.length) {
    el.innerHTML = `<div class="no-results">${filterQty ? '📭 Κανένα απόθεμα' : '🔎 Δεν βρέθηκαν'}</div>`;
    if (sortableInstances[c.id]) { sortableInstances[c.id].destroy(); delete sortableInstances[c.id]; }
    return;
  }
  const dupMap = buildDuplicateMap();
  let html = '';
  filtered.forEach(p => {
    const idx = c.products.findIndex(prod => prod.name === p.name);
    const unitLabel = { pieces:'Τεμάχια', kg:'Κιλά', pallet:'Παλέτα' }[p.su] || 'Τεμάχια';
    const step = p.su === 'kg' ? '0.1' : '1';
    const inputMode = p.su === 'kg' ? 'decimal' : 'numeric';
    const bv = p.boxes === 0 ? '' : p.boxes;
    const sv = p.sv === 0 ? '' : p.sv;
    const hasQty = p.boxes > 0 || p.sv > 0;
    // Έλεγχος διπλότυπου
    let isDup = false, otherCats = [], qtyAlert = false;
    const dups = dupMap.get(p.name.toLowerCase());
    if (dups && dups.length > 1) {
      const others = dups.filter(e => e.cid !== c.id);
      if (others.length) {
        isDup = true;
        otherCats = others.map(e => e.cname);
        const currentHas = p.boxes > 0 || p.sv > 0;
        const anyOtherHas = others.some(e => e.product.boxes > 0 || e.product.sv > 0);
        if (currentHas && anyOtherHas) qtyAlert = true;
      }
    }
    const thumb = p.img ?
      `<div class="thumb-wrap"><img class="product-thumb" src="${esc(p.img)}" onclick="openImgOv('${c.id}','${esc(p.name)}')"><button class="thumb-del" onclick="removePhoto('${c.id}','${esc(p.name)}')">✕</button></div>` :
      `<div class="product-thumb-ph" onclick="triggerPhoto('${c.id}','${esc(p.name)}')"><div class="ph-ico">📷</div><div>Φωτό</div></div>`;
    html += `<div class="product ${hasQty && !isDup ? 'has-qty' : ''} ${isDup ? 'dup-warn' : ''} ${qtyAlert ? 'dup-alert' : ''}" data-idx="${idx}">
      <div class="product-header">
        <span class="drag-handle" title="Σύρετε για ταξινόμηση">☰</span>
        ${thumb}
        <div class="product-name">${esc(p.name)}${isDup ? `<span class="dup-icon" title="Υπάρχει και στις: ${esc(otherCats.join(', '))}">⚠️</span>` : ''}</div>
        <div class="product-actions">
          <button class="btn-edit" onclick="openEditModal('${c.id}',${idx})">✏️</button>
          <button class="btn-trash" onclick="delProduct('${c.id}',${idx})">🗑️</button>
        </div>
      </div>
      <div class="product-controls">
        <div class="qty-item"><div class="qty-label"><span>Κιβώτια</span></div>
          <div class="qty-ctrl" id="bc_${idx}"><button onclick="chgQty('${c.id}',${idx},'b',-1)">–</button>
            <input type="number" min="0" step="1" value="${bv}" inputmode="numeric" onchange="updQty('${c.id}',${idx},'b',this.value)">
            <button onclick="chgQty('${c.id}',${idx},'b',1)">+</button></div>
        </div>
        <div class="qty-item"><div class="qty-label" onclick="openUnitModal('${c.id}',${idx})"><span>${unitLabel}</span> <span>⚙️</span></div>
          <div class="qty-ctrl" id="sc_${idx}"><button onclick="chgQty('${c.id}',${idx},'s',-1)">–</button>
            <input type="number" min="0" step="${step}" value="${sv}" inputmode="${inputMode}" onchange="updQty('${c.id}',${idx},'s',this.value)">
            <button onclick="chgQty('${c.id}',${idx},'s',1)">+</button></div>
        </div>
      </div>
    </div>`;
  });
  el.innerHTML = html;
  // Sortable μόνο αν δεν υπάρχει φίλτρο
  if (sortableInstances[c.id]) sortableInstances[c.id].destroy();
  if (!term && !filterQty) {
    sortableInstances[c.id] = new Sortable(el, {
      handle: '.drag-handle',
      animation: 150,
      onEnd: function() {
        const newOrder = Array.from(el.children).map(child => parseInt(child.dataset.idx, 10));
        const oldProds = c.products;
        c.products = newOrder.map(i => oldProds[i]);
        save();
        renderProducts(q('search').value); // ανανέωση για σωστά data-idx
      }
    });
  }
}

function buildDuplicateMap() {
  const map = new Map();
  cats.forEach(c => {
    c.products.forEach(p => {
      const key = p.name.toLowerCase();
      if (!map.has(key)) map.set(key, []);
      map.get(key).push({ cid: c.id, cname: c.name, product: p });
    });
  });
  return map;
}

// ─── Κατηγορίες & βασική πλοήγηση ──────────────────────────
function switchCat(id) {
  activeId = id;
  filterQty = false;
  q('filterBtn').classList.remove('active');
  renderTabs();
  renderContent();
  q('search').value = '';
  renderProducts('');
  renderStats();
}
function refreshAll() {
  renderTabs();
  renderContent();
  renderProducts(q('search').value);
  renderStats();
}
function filterTab() { renderProducts(q('search').value); }
function toggleFilter() { filterQty = !filterQty; q('filterBtn').classList.toggle('active', filterQty); renderProducts(q('search').value); }

// ─── Ποσότητες ─────────────────────────────────────────────
window.chgQty = function(cid, idx, type, delta) {
  const c = cats.find(x => x.id === cid);
  if (!c) return;
  const p = c.products[idx];
  let nv = Math.max(0, (type === 'b' ? p.boxes : p.sv) + delta);
  if (type === 'b') p.boxes = nv;
  else p.sv = nv;
  save();
  // flash effect
  const ctrl = q((type === 'b' ? 'bc_' : 'sc_') + idx);
  if (ctrl) {
    const inp = ctrl.querySelector('input');
    if (inp) {
      inp.value = nv === 0 ? '' : nv;
      inp.classList.remove('flash-up','flash-dn');
      inp.offsetWidth;
      inp.classList.add(delta > 0 ? 'flash-up' : 'flash-dn');
      setTimeout(() => inp.classList.remove('flash-up','flash-dn'), 400);
    }
  }
  refreshAll();
};
window.updQty = function(cid, idx, type, val) {
  const c = cats.find(x => x.id === cid);
  if (!c) return;
  const p = c.products[idx];
  let num = parseFloat(val);
  if (isNaN(num) || num < 0) num = 0;
  if (type === 'b') p.boxes = Math.floor(num);
  else p.sv = num;
  save();
  refreshAll();
};
window.clearCatQty = function() {
  const c = cats.find(x => x.id === activeId);
  if (!c || !confirm(`Μηδενισμός ποσοτήτων στην κατηγορία "${c.name}";`)) return;
  c.products.forEach(p => { p.boxes = 0; p.sv = 0; });
  save();
  refreshAll();
  showToast(`✅ Μηδενίστηκε η κατηγορία ${c.name}`);
};

// ─── CRUD προϊόντων ────────────────────────────────────────
window.delProduct = function(cid, idx) {
  const c = cats.find(x => x.id === cid);
  const p = c.products[idx];
  if (!confirm(`Διαγραφή "${p.name}";`)) return;
  c.deleted.push({ name: p.name, su: p.su });
  c.products.splice(idx, 1);
  save();
  refreshAll();
};
window.openAddModal = function() {
  q('newName').value = '';
  q('newName').style.borderColor = '';
  q('dupWarn').textContent = '';
  openMod('addModal');
};
window.checkDup = function() {
  const name = q('newName').value.trim().toLowerCase();
  const warn = q('dupWarn');
  if (!name) { warn.textContent = ''; return; }
  const dup = cats.find(c => c.id !== activeId && c.products.some(p => p.name.toLowerCase() === name));
  if (dup) { warn.textContent = `⚠️ Υπάρχει στην: ${dup.name}`; q('newName').style.borderColor = 'red'; }
  else { warn.textContent = ''; q('newName').style.borderColor = ''; }
};
window.addProduct = function() {
  const name = q('newName').value.trim();
  if (!name) return alert('Δώστε όνομα');
  const c = cats.find(x => x.id === activeId);
  if (c.products.some(p => p.name.toLowerCase() === name.toLowerCase())) return alert('Υπάρχει ήδη');
  c.products.push(mkProduct(name, 'pieces'));
  closeMod('addModal');
  save();
  refreshAll();
};
window.openEditModal = function(cid, idx) {
  pendEdit = { cid, idx };
  q('editName').value = cats.find(c => c.id === cid).products[idx].name;
  openMod('editModal');
};
window.saveEdit = function() {
  if (!pendEdit) return;
  const newName = q('editName').value.trim();
  if (!newName) return alert('Κενό');
  const c = cats.find(x => x.id === pendEdit.cid);
  if (c.products.some((p,i) => i !== pendEdit.idx && p.name.toLowerCase() === newName.toLowerCase())) return alert('Υπάρχει ήδη');
  c.products[pendEdit.idx].name = newName;
  save();
  closeMod('editModal');
  pendEdit = null;
  refreshAll();
};
window.openUnitModal = function(cid, idx) { pendUnit = { cid, idx }; openMod('unitModal'); };
document.querySelectorAll('.unit-opt').forEach(opt => {
  opt.addEventListener('click', () => {
    if (!pendUnit) return;
    const c = cats.find(x => x.id === pendUnit.cid);
    c.products[pendUnit.idx].su = opt.dataset.unit;
    closeMod('unitModal');
    pendUnit = null;
    save();
    refreshAll();
  });
});

// ─── Φωτογραφίες ───────────────────────────────────────────
function compressImg(file, cb) {
  const r = new FileReader();
  r.onload = e => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      const MAX = 400;
      if (w > h) { if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; } }
      else { if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; } }
      const cv = document.createElement('canvas');
      cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(cv.toDataURL('image/jpeg', 0.75));
    };
    img.src = e.target.result;
  };
  r.readAsDataURL(file);
}
q('fileInp').addEventListener('change', function() {
  if (!this.files || !this.files[0]) return;
  const file = this.files[0];
  const ctx = pendPhoto || ovCtx;
  if (!ctx) { this.value = ''; return; }
  compressImg(file, b64 => {
    const c = cats.find(x => x.id === ctx.cid);
    const p = c && c.products.find(x => x.name === ctx.pname);
    if (p) {
      p.img = b64;
      save();
      if (q('imgOv').classList.contains('open')) q('ovImg').src = b64;
      renderProducts(q('search').value);
      renderStats();
    }
    pendPhoto = null;
  });
  this.value = '';
});
window.triggerPhoto = function(cid, pname) {
  const choice = confirm("Πατήστε 'ΟΚ' για Link (URL) εικόνας.\nΠατήστε 'Ακύρωση' για μεταφόρτωση από συσκευή.");
  if (choice) {
    const url = prompt("Επικολλήστε το Link (URL) της εικόνας:");
    if (url && url.trim()) {
      const c = cats.find(x => x.id === cid);
      const p = c && c.products.find(x => x.name === pname);
      if (p) { p.img = url.trim(); save(); renderProducts(q('search').value); renderStats(); }
    }
  } else {
    pendPhoto = { cid, pname };
    q('fileInp').click();
  }
};
window.openImgOv = function(cid, pname) {
  const c = cats.find(x => x.id === cid);
  const p = c && c.products.find(x => x.name === pname);
  if (!p || !p.img) return;
  ovCtx = { cid, pname };
  q('ovName').textContent = pname;
  q('ovImg').src = p.img;
  openMod('imgOv');
};
window.closeImgOv = function(e) { if (!e || e.target.id === 'imgOv') { q('imgOv').classList.remove('open'); ovCtx = null; } };
window.ovChangePhoto = function() {
  if (!ovCtx) return;
  const choice = confirm("Link (URL) για αλλαγή εικόνας;\nΑκύρωση για μεταφόρτωση");
  if (choice) {
    const url = prompt("Νέο URL εικόνας:");
    if (url && url.trim()) {
      const c = cats.find(x => x.id === ovCtx.cid);
      const p = c && c.products.find(x => x.name === ovCtx.pname);
      if (p) { p.img = url.trim(); save(); q('ovImg').src = p.img; renderProducts(q('search').value); renderStats(); }
    }
  } else {
    q('fileInp').click();
  }
};
window.ovRemove = function() {
  if (!ovCtx) return;
  const c = cats.find(x => x.id === ovCtx.cid);
  const p = c && c.products.find(x => x.name === ovCtx.pname);
  if (p) { p.img = ''; save(); }
  q('imgOv').classList.remove('open');
  ovCtx = null;
  renderProducts(q('search').value);
  renderStats();
};
window.removePhoto = function(cid, pname) {
  const c = cats.find(x => x.id === cid);
  const p = c && c.products.find(x => x.name === pname);
  if (p) { p.img = ''; save(); renderProducts(q('search').value); renderStats(); }
};

// ─── Διεγραμμένα ───────────────────────────────────────────
window.showDeletedModal = function() {
  let html = '';
  cats.forEach(c => {
    if (!c.deleted.length) return;
    html += `<h4 style="margin:10px 0 4px;color:#1e3a5f;">${esc(c.name)}</h4>`;
    c.deleted.forEach((item, idx) => {
      const ul = { pieces:'Τεμ', kg:'Kg', pallet:'Παλ' }[item.su] || 'Τεμ';
      html += `<div class="del-item"><span><strong>${esc(item.name)}</strong> (${ul})</span>
        <div style="display:flex;gap:4px;">
          <button class="btn-restore" onclick="restoreProd('${c.id}',${idx})">↩️</button>
          <button class="btn-perm" onclick="permDel('${c.id}',${idx})">🗑️</button>
        </div></div>`;
    });
  });
  q('delList').innerHTML = html || '<div style="text-align:center;padding:20px;">📭 Κανένα</div>';
  openMod('deletedModal');
};
window.restoreProd = function(cid, i) {
  const c = cats.find(x => x.id === cid);
  const item = c.deleted[i];
  if (c.products.find(p => p.name === item.name)) { alert('Υπάρχει ήδη'); return; }
  c.products.push(mkProduct(item.name, item.su));
  c.deleted.splice(i, 1);
  save();
  refreshAll();
  showDeletedModal();
};
window.permDel = function(cid, i) {
  if (confirm('Οριστική διαγραφή;')) {
    cats.find(x => x.id === cid).deleted.splice(i, 1);
    save();
    showDeletedModal();
  }
};

// ─── Διαχείριση κατηγοριών ─────────────────────────────────
window.openCatMgr = function() {
  renderCatList();
  openMod('catModal');
};
function renderCatList() {
  q('catList').innerHTML = cats.map(c => `<div class="cat-item"><span class="cat-name">${esc(c.name)}</span>
    <div class="cat-actions"><button onclick="renCat('${c.id}')">✏️</button>
    <button onclick="delCat('${c.id}')" ${cats.length <= 1 ? 'disabled' : ''}>🗑️</button></div></div>`).join('');
}
window.renCat = function(id) {
  const c = cats.find(x => x.id === id);
  const nn = prompt('Νέο όνομα:', c.name);
  if (nn && nn.trim()) { c.name = nn.trim(); save(); refreshAll(); renderCatList(); }
};
window.delCat = function(id) {
  if (cats.length <= 1) { alert('Τουλάχιστον μία κατηγορία.'); return; }
  if (!confirm('Διαγραφή κατηγορίας;')) return;
  cats = cats.filter(c => c.id !== id);
  if (activeId === id) activeId = cats[0].id;
  save();
  refreshAll();
  renderCatList();
};
window.addCategory = function() {
  const name = q('newCatName').value.trim();
  if (!name) { alert('Δώστε όνομα'); return; }
  cats.push({ id: 'c' + Date.now(), name, products: [], deleted: [] });
  q('newCatName').value = '';
  save();
  refreshAll();
  renderCatList();
};

// ─── PDF & Save to File ────────────────────────────────────
window.exportPDF = function() {
  const all = [];
  cats.forEach(c => {
    c.products.forEach(p => {
      if (p.boxes > 0 || p.sv > 0) all.push({ catName: c.name, product: p });
    });
  });
  if (!all.length) { alert('Κανένα απόθεμα.'); return; }
  const grouped = {};
  all.forEach(x => { if (!grouped[x.catName]) grouped[x.catName] = []; grouped[x.catName].push(x.product); });
  const fmt = (v, u) => {
    if (!v) return '';
    const num = u === 'kg' ? parseFloat(v).toFixed(1) : Math.floor(v);
    const txt = { pieces:'τεμ.', kg:'kg', pallet:'παλ.' }[u] || '';
    return `${num} ${txt}`;
  };
  let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>THASSOS IMPERIAL</title>
    <style>body{font-family:sans-serif;font-size:12px;padding:20px}h1{color:#1e3a5f;text-align:center}
    .dt{text-align:center;margin:4px 0 20px}.cat{margin-top:20px}
    h2{background:#1e3a5f;color:white;padding:8px 12px;border-radius:8px}
    table{width:100%;border-collapse:collapse}th{background:#d9e6f2;padding:8px;border:1px solid #a0bbd0}
    td{border:1px solid #ccc;padding:6px;vertical-align:middle}
    td:nth-child(3),td:nth-child(4){text-align:center}.g{background:#d4edda!important}
    .th{width:40px;height:40px;object-fit:cover;border-radius:6px;display:block}
    @media print{body{margin:.5cm}}</style></head><body>
    <h1>THASSOS IMPERIAL</h1><div class="dt">${new Date().toLocaleDateString('el-GR')}</div>`;
  Object.keys(grouped).forEach(catName => {
    html += `<div class="cat"><h2>${esc(catName)}</h2>
      <table><thead><tr><th></th><th>Προϊόν</th><th>Κιβώτια</th><th>Ποσότητα</th></tr></thead><tbody>`;
    grouped[catName].forEach(p => {
      const thumb = p.img ? `<img class="th" src="${p.img}" alt="">` : '';
      html += `<tr><td>${thumb}</td><td>${esc(p.name)}</td>
        <td class="${p.boxes > 0 ? 'g' : ''}">${p.boxes || ''}</td>
        <td class="${p.sv > 0 ? 'g' : ''}">${fmt(p.sv, p.su)}</td></tr>`;
    });
    html += `</tbody></table></div>`;
  });
  html += `<div style="margin-top:30px;text-align:center;color:#6f8fae">THASSOS IMPERIAL</div></body></html>`;
  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
  win.print();
};

window.saveToFile = function() {
  const dataStr = JSON.stringify(cats);
  const htmlFull = document.documentElement.outerHTML;
  const newHtml = htmlFull.replace(/var EMBEDDED_DATA\s*=\s*null;/, `var EMBEDDED_DATA = ${dataStr};`);
  const blob = new Blob([newHtml], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const now = new Date();
  const stamp = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
  a.href = url; a.download = `THASSOS_IMPERIAL_${stamp}.html`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✅ Αρχείο αποθηκεύτηκε!');
};

window.addEventListener('scroll', () => sb.classList.toggle('vis', window.scrollY > 300));
sb.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

}
refreshAll();
