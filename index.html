<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>THASSOS IMPERIAL · Αποθήκη</title>
  <style>
    *{box-sizing:border-box;margin:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f9ff;-webkit-tap-highlight-color:transparent;}
    header{background:#1e3a5f;color:white;padding:10px 12px;text-align:center;position:sticky;top:0;z-index:20;box-shadow:0 2px 10px rgba(0,0,0,.1);}
    header h1{font-size:1.2rem;font-weight:600;letter-spacing:.5px;}
    .tabs-container{display:flex;align-items:center;background:white;border-bottom:2px solid #1e3a5f;position:sticky;top:48px;z-index:19;}
    .tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;flex:1;}
    .tab{flex:1 0 auto;padding:10px 14px;text-align:center;font-weight:600;color:#1e3a5f;cursor:pointer;background:#eef4ff;border-right:1px solid #cdddec;font-size:13px;user-select:none;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;gap:2px;}
    .tab:last-child{border-right:none;}
    .tab.active{background:#1e3a5f;color:white;}
    .tab-badge{font-size:10px;font-weight:700;background:#f59e0b;color:white;border-radius:30px;padding:1px 7px;}
    .tab.active .tab-badge{background:#fbbf24;color:#1e3a5f;}
    .tab-badge.zero{background:#cbd5e1;color:#64748b;}
    .tab.active .tab-badge.zero{background:#93a3b8;color:white;}
    .manage-cats-btn{background:white;border:none;font-size:20px;padding:0 12px;cursor:pointer;color:#1e3a5f;border-left:1px solid #cdddec;height:100%;display:flex;align-items:center;touch-action:manipulation;}
    .search-section{background:white;padding:8px 12px 10px;box-shadow:0 2px 5px rgba(0,0,0,.05);position:sticky;top:96px;z-index:18;}
    #search{width:100%;padding:10px 14px;font-size:14px;border:1.5px solid #d0ddeb;border-radius:30px;outline:none;background:#fafcff;}
    #search:focus{border-color:#1e3a5f;background:white;}
    .action-bar{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
    .action-bar button{flex:1 0 calc(20% - 6px);padding:8px 0;background:#2563eb;color:white;border:none;border-radius:30px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;touch-action:manipulation;}
    .btn-pdf{background:#0b3b5c!important;}
    .btn-clear{background:#b91c1c!important;}
    .btn-del{background:#6b4f3c!important;}
    .btn-filter{background:#059669!important;}
    .btn-filter.active{background:#065f46!important;box-shadow:0 0 0 2px #6ee7b7;}
    .btn-ai{background:#7c3aed!important;}
    .stats-bar{display:flex;gap:6px;padding:6px 10px 2px;overflow-x:auto;}
    .stat-chip{background:white;border:1px solid #d1e3f3;border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;color:#1e3a5f;white-space:nowrap;flex-shrink:0;}
    .stat-chip span{color:#2563eb;}
    .tab-content{padding:8px 10px 80px;}
    .tab-pane{display:none;}
    .tab-pane.active{display:block;}
    .product{background:white;margin:8px 0;padding:10px;border-radius:18px;box-shadow:0 2px 6px rgba(0,0,0,.03);border:1px solid #e2edf7;transition:background .2s,border-color .2s;}
    .product.has-qty{border-left:4px solid #22c55e;}
    .product.dup-warn{border-left:5px solid #e53e3e;}
    .product.dup-alert{background:#fff5f5;border-color:#fc8181;border-left:5px solid #c53030;}
    .product-header{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
    .product-thumb{width:54px;height:54px;border-radius:12px;object-fit:cover;flex-shrink:0;border:1.5px solid #e2edf7;cursor:pointer;}
    .product-thumb-ph{width:54px;height:54px;border-radius:12px;flex-shrink:0;border:1.5px dashed #c5d8ea;background:#f0f5fa;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:2px;color:#7e9ab5;font-size:10px;font-weight:600;text-align:center;}
    .product-thumb-ph .ico{font-size:20px;}
    .product-thumb-ph.loading{background:#e0edf8;border-color:#7c3aed;animation:pulse 1s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .product-name{font-weight:700;font-size:14px;color:#0f2a44;flex:1;word-break:break-word;line-height:1.2;}
    .dup-icon{font-size:15px;margin-left:3px;color:#e53e3e;}
    .product-actions{display:flex;gap:2px;flex-shrink:0;}
    .btn-edit,.btn-del2{background:none;border:none;font-size:16px;cursor:pointer;padding:6px;color:#7e9ab5;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
    .product-controls{display:flex;gap:10px;justify-content:space-around;}
    .qty-item{flex:1;display:flex;flex-direction:column;align-items:center;}
    .qty-label{display:flex;align-items:center;gap:2px;font-size:11px;font-weight:600;color:#1e3a5f;margin-bottom:3px;text-transform:uppercase;cursor:pointer;}
    .qty-label span{border-bottom:1px dashed #1e3a5f;}
    .qty-ctrl{display:flex;align-items:center;gap:2px;background:#f0f5fa;padding:2px;border-radius:30px;width:100%;max-width:150px;justify-content:center;}
    .qty-ctrl button{width:40px;height:40px;border-radius:50%;border:none;background:#1e3a5f;color:white;font-size:20px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 4px rgba(0,0,0,.1);touch-action:manipulation;}
    .qty-ctrl input{width:50px;text-align:center;font-size:14px;font-weight:700;border:1px solid #bdd3e8;border-radius:30px;padding:6px 0;background:white;-moz-appearance:textfield;}
    .qty-ctrl input::-webkit-outer-spin-button,.qty-ctrl input::-webkit-inner-spin-button{-webkit-appearance:none;}
    @keyframes fg{0%{background:#bbf7d0}100%{background:white}}
    @keyframes fr{0%{background:#fee2e2}100%{background:white}}
    .flash-up{animation:fg .4s ease;}
    .flash-dn{animation:fr .4s ease;}
    #scrollBtn{position:fixed;bottom:16px;right:16px;width:44px;height:44px;border-radius:50%;background:#1e3a5f;color:white;border:none;box-shadow:0 4px 12px rgba(0,0,0,.2);font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:100;opacity:0;transform:scale(.9);pointer-events:none;transition:opacity .2s,transform .2s;}
    #scrollBtn.vis{opacity:1;transform:scale(1);pointer-events:auto;}
    .no-results{text-align:center;padding:25px;color:#5f7d9c;font-style:italic;background:white;border-radius:20px;margin-top:16px;}
    .footer-note{text-align:center;font-size:11px;color:#6f8fae;padding:12px;}
    .ai-prog{background:#f3f0ff;border:1px solid #c4b5fd;border-radius:14px;padding:10px 14px;margin:6px 10px;font-size:12px;color:#5b21b6;font-weight:600;display:none;}
    .pb-wrap{background:#ddd6fe;border-radius:30px;height:6px;margin-top:6px;}
    .pb{background:#7c3aed;height:6px;border-radius:30px;transition:width .4s;}
    /* Overlay */
    .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.88);z-index:2000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
    .overlay.open{display:flex;}
    .overlay img{max-width:88%;max-height:65vh;border-radius:16px;object-fit:contain;}
    .ov-name{color:white;font-size:16px;font-weight:700;text-align:center;padding:0 20px;}
    .ov-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
    .ov-btns button{padding:10px 20px;border:none;border-radius:30px;font-weight:700;font-size:14px;cursor:pointer;}
    .ov-refresh{background:#7c3aed;color:white;}
    .ov-remove{background:#b91c1c;color:white;}
    .ov-close{background:#e2edf7;color:#1e3a5f;}
    /* Modals */
    .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:1000;}
    .modal.open{display:flex;}
    .modal-box{background:white;border-radius:20px;padding:20px 16px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 35px rgba(0,0,0,.2);}
    .modal-box h3{margin:0 0 16px;color:#1e3a5f;text-align:center;font-weight:700;font-size:18px;}
    .modal-box input{padding:12px 14px;margin:6px 0;background:#f4f9ff;border:1px solid #cbdbe9;border-radius:30px;font-size:15px;width:100%;outline:none;}
    .modal-box .btn-primary{margin-top:12px;padding:12px;width:100%;background:#1e3a5f;color:white;border:none;border-radius:30px;font-weight:bold;font-size:15px;cursor:pointer;touch-action:manipulation;display:block;}
    .unit-opt{padding:12px;margin:4px 0;background:#f0f5fa;border-radius:30px;text-align:center;font-weight:600;cursor:pointer;}
    .unit-opt:hover{background:#1e3a5f;color:white;}
    .del-item{background:#fef9ec;margin:6px 0;padding:8px;border-radius:16px;display:flex;justify-content:space-between;align-items:center;gap:4px;font-size:13px;}
    .btn-restore{border:none;border-radius:20px;background:#15803d;color:white;cursor:pointer;font-weight:bold;padding:5px 8px;font-size:13px;}
    .btn-perm{border:none;border-radius:20px;background:#b91c1c;color:white;cursor:pointer;font-weight:bold;padding:5px 8px;font-size:13px;margin-left:4px;}
    .cat-item{display:flex;align-items:center;justify-content:space-between;padding:10px;background:#f0f7ff;border-radius:14px;margin-bottom:6px;}
    .cat-name{font-weight:600;color:#1e3a5f;font-size:15px;}
    .cat-actions button{background:none;border:none;font-size:22px;margin-left:8px;cursor:pointer;padding:4px;}
    @media(max-width:360px){.action-bar button{font-size:10px;padding:7px 0;}.tab{padding:9px 10px;font-size:12px;}}
  </style>
</head>
<body>

<button id="scrollBtn">⬆️</button>
<header><h1>THASSOS IMPERIAL</h1></header>

<div class="tabs-container">
  <div class="tabs" id="tabsEl"></div>
  <button class="manage-cats-btn" onclick="openCatMgr()">📋</button>
</div>

<div class="search-section">
  <input type="text" id="search" placeholder="🔍 Αναζήτηση..." oninput="filterTab()">
  <div class="action-bar">
    <button class="btn-pdf"   onclick="exportPDF()">📄 PDF</button>
    <button                   onclick="openAddModal()">➕ Νέο</button>
    <button class="btn-clear" id="clearBtn" onclick="clearCatQty()">🧹 Μηδέν</button>
    <button class="btn-filter"id="filterBtn" onclick="toggleFilter()">📦 Με ποσ.</button>
    <button class="btn-ai"    onclick="aiBatchImages()">🤖 AI Εικόνες</button>
    <button class="btn-del"   onclick="showDeletedModal()">🗑️ Διεγρ.</button>
  </div>
</div>

<div class="ai-prog" id="aiProg">
  <div id="aiTxt">Αναζήτηση…</div>
  <div class="pb-wrap"><div class="pb" id="aiBar" style="width:0%"></div></div>
</div>

<div class="stats-bar" id="statsBar"></div>
<div class="tab-content" id="tabContent"></div>
<div class="footer-note">THASSOS IMPERIAL · Δυναμική διαχείριση αποθήκης</div>

<!-- Image overlay -->
<div id="imgOv" class="overlay" onclick="closeImgOv(event)">
  <div class="ov-name" id="ovName"></div>
  <img id="ovImg" src="" alt="">
  <div class="ov-btns" onclick="event.stopPropagation()">
    <button class="ov-refresh" onclick="ovRefresh()">🔄 Νέα εικόνα</button>
    <button class="ov-remove"  onclick="ovRemove()">🗑️ Αφαίρεση</button>
    <button class="ov-close"   onclick="closeImgOv()">✕ Κλείσιμο</button>
  </div>
</div>

<!-- Unit modal -->
<div id="unitModal" class="modal" onclick="closeModal('unitModal',event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h3>Επιλογή μονάδας</h3>
    <div class="unit-opt" data-unit="pieces">📦 Τεμάχια</div>
    <div class="unit-opt" data-unit="kg">⚖️ Κιλά</div>
    <div class="unit-opt" data-unit="pallet">🏗️ Παλέτα</div>
  </div>
</div>

<!-- Add product modal -->
<div id="addModal" class="modal" onclick="closeModal('addModal',event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h3>➕ Νέο προϊόν</h3>
    <input type="text" id="newName" placeholder="Όνομα προϊόντος" autocomplete="off" oninput="checkDupName()">
    <div id="dupWarn" style="color:red;font-size:12px;margin-top:4px;min-height:16px;"></div>
    <button class="btn-primary" onclick="addProduct()">Προσθήκη</button>
  </div>
</div>

<!-- Edit product modal -->
<div id="editModal" class="modal" onclick="closeModal('editModal',event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h3>✏️ Επεξεργασία</h3>
    <input type="text" id="editName" placeholder="Νέο όνομα">
    <button class="btn-primary" onclick="saveEdit()">Αποθήκευση</button>
  </div>
</div>

<!-- Deleted modal -->
<div id="deletedModal" class="modal" onclick="closeModal('deletedModal',event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h3>🗑️ Διεγραμμένα</h3>
    <div id="delList"></div>
    <button class="btn-primary" onclick="closeModal('deletedModal')">Κλείσιμο</button>
  </div>
</div>

<!-- Category manager modal -->
<div id="catModal" class="modal" onclick="closeModal('catModal',event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h3>📂 Κατηγορίες</h3>
    <div id="catList"></div>
    <div style="display:flex;gap:6px;margin-top:10px;">
      <input type="text" id="newCatName" placeholder="Νέα κατηγορία" style="flex:2;">
      <button class="btn-primary" style="flex:1;margin-top:0;" onclick="addCategory()">➕</button>
    </div>
    <button class="btn-primary" onclick="closeModal('catModal')" style="margin-top:12px;">Κλείσιμο</button>
  </div>
</div>

function initCats(){
  cats=DEF.map(function(d,i){
    return{id:'c'+Date.now()+'_'+i,name:d.name,products:d.ps.map(function(p){return{name:p.name,boxes:p.boxes||0,sv:p.sv||0,su:p.su||'pieces',img:p.img||''};}),deleted:[]};
  });
}
function save(){try{localStorage.setItem(SK,JSON.stringify(cats));}catch(e){}}
function load(){
  try{
    var raw=localStorage.getItem(SK);
    if(!raw){initCats();return;}
    var d=JSON.parse(raw);
    if(Array.isArray(d)&&d.length){cats=d;cats.forEach(function(c){c.products.forEach(function(p){if(!p.img)p.img='';if(!p.sv)p.sv=0;});});}
    else initCats();
  }catch(e){initCats();}
}

load();
if(!cats.length)initCats();
activeId=cats[0].id;

// ── Duplicate map ──
function dupMap(){
  var m={};
  cats.forEach(function(c){c.products.forEach(function(p){var k=p.name.toLowerCase();if(!m[k])m[k]=[];m[k].push({cid:c.id,cname:c.name,p:p});});});
  var r={};
  Object.keys(m).forEach(function(k){if(m[k].length>1)r[k]=m[k];});
  return r;
}

// ── Stats ──
function catStats(c){
  var wq=c.products.filter(function(p){return p.boxes>0||p.sv>0;}).length;
  var tb=c.products.reduce(function(s,p){return s+(p.boxes||0);},0);
  var wi=c.products.filter(function(p){return p.img;}).length;
  return{wq:wq,total:c.products.length,tb:tb,wi:wi};
}
function renderStats(){
  var c=cats.find(function(x){return x.id===activeId;});if(!c)return;
  var s=catStats(c);
  q('statsBar').innerHTML='<div class="stat-chip">Σύνολο: <span>'+s.total+'</span></div><div class="stat-chip">Με ποσ/τα: <span>'+s.wq+'</span></div><div class="stat-chip">Κιβώτια: <span>'+s.tb+'</span></div><div class="stat-chip">Με εικόνα: <span>'+s.wi+'</span></div>';
}

// ── Tabs ──
function renderTabs(){
  q('tabsEl').innerHTML=cats.map(function(c){
    var s=catStats(c);
    return'<div class="tab'+(c.id===activeId?' active':'')+'" onclick="switchCat(\''+c.id+'\')">'+esc(c.name)+'<span class="tab-badge'+(s.wq===0?' zero':'')+'">'+s.wq+'</span></div>';
  }).join('');
  var ac=cats.find(function(x){return x.id===activeId;});
  if(ac)q('clearBtn').textContent='🧹 '+ac.name.split(' ')[0];
}
function renderContent(){
  q('tabContent').innerHTML=cats.map(function(c){
    return'<div id="pane_'+c.id+'" class="tab-pane'+(c.id===activeId?' active':'')+'"><div id="list_'+c.id+'"></div></div>';
  }).join('');
}
function renderProducts(ft){
  ft=ft||'';
  var c=cats.find(function(x){return x.id===activeId;});if(!c)return;
  var el=q('list_'+c.id);if(!el)return;
  var term=ft.trim().toLowerCase();
  var ps=c.products.slice();
  if(term)ps=ps.filter(function(p){return p.name.toLowerCase().indexOf(term)>=0;});
  if(filterQty)ps=ps.filter(function(p){return p.boxes>0||p.sv>0;});
  if(!ps.length){el.innerHTML='<div class="no-results">'+(filterQty?'📭 Κανένα απόθεμα':'🔎 Δεν βρέθηκαν')+'</div>';return;}
  var dm=dupMap();
  var html='';
  ps.forEach(function(p){
    var oi=c.products.indexOf(p);
    var ul={pieces:'Τεμάχια',kg:'Κιλά',pallet:'Παλέτα'}[p.su]||'Τεμάχια';
    var st=p.su==='kg'?'0.1':'1';
    var bv=p.boxes===0?'':p.boxes;
    var sv=p.sv===0?'':p.sv;
    var im=p.su==='kg'?'decimal':'numeric';
    var cid=c.id; var pn=p.name;
    // safe attrs
    var safeCid=cid.replace(/'/g,"\\'");
    var safePn=pn.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
    var key=pn.toLowerCase();
    var dups=dm[key];
    var isDup=false,ocats=[],qaAlert=false;
    if(dups){var oth=dups.filter(function(e){return e.cid!==cid;});if(oth.length){isDup=true;ocats=oth.map(function(e){return e.cname;});if((p.boxes>0||p.sv>0)&&oth.some(function(e){return e.p.boxes>0||e.p.sv>0;}))qaAlert=true;}}
    var hq=p.boxes>0||p.sv>0;
    // thumbnail
    var phid='ph'+oi+'_'+cid.replace(/[^a-z0-9]/gi,'');
    var thumb=p.img
      ?'<img class="product-thumb" src="'+esc(p.img)+'" alt="" onclick="openImgOv(\''+safeCid+'\',\''+safePn+'\')" onerror="this.style.display=\'none\'">'
      :'<div class="product-thumb-ph" id="'+phid+'" onclick="loadImg(\''+safeCid+'\',\''+safePn+'\')"><div class="ico">📷</div><div>AI</div></div>';
    html+='<div class="product'+(hq&&!isDup?' has-qty':'')+(isDup?' dup-warn':'')+(qaAlert?' dup-alert':'')+'" id="pr_'+oi+'">'
      +'<div class="product-header">'
      +thumb
      +'<div class="product-name">'+esc(pn)+(isDup?'<span class="dup-icon" title="Στις: '+esc(ocats.join(', '))+'">⚠️</span>':'')+'</div>'
      +'<div class="product-actions">'
      +'<button class="btn-edit" onclick="openEditModal(\''+safeCid+'\','+oi+')">✏️</button>'
      +'<button class="btn-del2" onclick="delProduct(\''+safeCid+'\','+oi+')">🗑️</button>'
      +'</div></div>'
      +'<div class="product-controls">'
      +'<div class="qty-item"><div class="qty-label"><span>Κιβώτια</span></div>'
      +'<div class="qty-ctrl" id="bc_'+oi+'">'
      +'<button onclick="chgQty(\''+safeCid+'\','+oi+',\'b\',-1)">–</button>'
      +'<input type="number" min="0" step="1" value="'+bv+'" inputmode="numeric" onchange="updQty(\''+safeCid+'\','+oi+',\'b\',this.value)">'
      +'<button onclick="chgQty(\''+safeCid+'\','+oi+',\'b\',1)">+</button>'
      +'</div></div>'
      +'<div class="qty-item"><div class="qty-label" onclick="openUnitModal(\''+safeCid+'\','+oi+')"><span>'+ul+'</span> <span>⚙️</span></div>'
      +'<div class="qty-ctrl" id="sc_'+oi+'">'
      +'<button onclick="chgQty(\''+safeCid+'\','+oi+',\'s\',-1)">–</button>'
      +'<input type="number" min="0" step="'+st+'" value="'+sv+'" inputmode="'+im+'" onchange="updQty(\''+safeCid+'\','+oi+',\'s\',this.value)">'
      +'<button onclick="chgQty(\''+safeCid+'\','+oi+',\'s\',1)">+</button>'
      +'</div></div>'
      +'</div></div>';
  });
  el.innerHTML=html;
}

function switchCat(id){activeId=id;filterQty=false;q('filterBtn').classList.remove('active');renderTabs();renderContent();q('search').value='';renderProducts('');renderStats();}
function refreshAll(){renderTabs();renderContent();renderProducts(q('search').value);renderStats();}
window.filterTab=function(){renderProducts(q('search').value);};
window.toggleFilter=function(){filterQty=!filterQty;q('filterBtn').classList.toggle('active',filterQty);renderProducts(q('search').value);};

// ── Quantities ──
window.chgQty=function(cid,idx,type,delta){
  var c=cats.find(function(x){return x.id===cid;});if(!c)return;
  var p=c.products[idx];
  var cur=type==='b'?p.boxes:p.sv;
  var nv=Math.max(0,cur+delta);
  if(type==='b')p.boxes=nv;else p.sv=nv;
  save();
  var ctrl=q((type==='b'?'bc_':'sc_')+idx);
  if(ctrl){var inp=ctrl.querySelector('input');if(inp){inp.value=nv===0?'':nv;inp.classList.remove('flash-up','flash-dn');void inp.offsetWidth;inp.classList.add(delta>0?'flash-up':'flash-dn');setTimeout(function(){inp.classList.remove('flash-up','flash-dn');},400);}}
  var pe=q('pr_'+idx);if(pe){var hq=p.boxes>0||p.sv>0;if(hq&&!pe.classList.contains('dup-warn'))pe.classList.add('has-qty');else if(!hq)pe.classList.remove('has-qty');}
  renderTabs();renderStats();
};
window.updQty=function(cid,idx,type,val){
  var c=cats.find(function(x){return x.id===cid;});if(!c)return;
  var p=c.products[idx];
  var num=parseFloat(val);if(isNaN(num)||num<0)num=0;
  if(type==='b')p.boxes=Math.floor(num);else p.sv=num;
  save();renderTabs();renderStats();
  var pe=q('pr_'+idx);if(pe){var hq=p.boxes>0||p.sv>0;if(hq&&!pe.classList.contains('dup-warn'))pe.classList.add('has-qty');else if(!hq)pe.classList.remove('has-qty');}
};
window.clearCatQty=function(){
  var c=cats.find(function(x){return x.id===activeId;});if(!c)return;
  if(!confirm('Μηδενισμός ποσοτήτων στην κατηγορία "'+c.name+'";'))return;
  c.products.forEach(function(p){p.boxes=0;p.sv=0;});
  save();refreshAll();
};

// ── AI Images ──
async function callClaude(prompt){
  var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:80,messages:[{role:'user',content:prompt}]})});
  var d=await res.json();
  return (d.content||[]).map(function(b){return b.text||'';}).join('').trim();
}
async function getImg(name){
  try{
    var kw=await callClaude('Translate this Greek grocery/food product name to 2-3 English keywords for image search. Return ONLY the keywords, nothing else: "'+name+'"');
    var enc=encodeURIComponent(kw.replace(/,/g,' '));
    var r=await fetch('https://source.unsplash.com/120x120/?'+enc+',food,product',{redirect:'follow'});
    return r.url;
  }catch(e){return '';}
}
window.loadImg=async function(cid,pname){
  var c=cats.find(function(x){return x.id===cid;});if(!c)return;
  var p=c.products.find(function(x){return x.name===pname;});if(!p)return;
  var idx=c.products.indexOf(p);
  var phid='ph'+idx+'_'+cid.replace(/[^a-z0-9]/gi,'');
  var ph=q(phid);if(ph){ph.classList.add('loading');ph.innerHTML='<div class="ico">⏳</div>';}
  var url=await getImg(pname);
  if(url){p.img=url;save();renderProducts(q('search').value);}
  else if(ph){ph.classList.remove('loading');ph.innerHTML='<div class="ico">📷</div><div>AI</div>';}
};
window.aiBatchImages=async function(){
  var c=cats.find(function(x){return x.id===activeId;});if(!c)return;
  var noImg=c.products.filter(function(p){return!p.img;});
  if(!noImg.length){alert('Όλα τα προϊόντα έχουν ήδη εικόνα!');return;}
  if(!confirm('Αυτόματη αναζήτηση εικόνων για '+noImg.length+' προϊόντα;'))return;
  var prog=q('aiProg'),bar=q('aiBar'),txt=q('aiTxt');
  prog.style.display='block';
  for(var i=0;i<noImg.length;i++){
    var p=noImg[i];
    txt.textContent='🤖 '+(i+1)+'/'+noImg.length+' — '+p.name;
    bar.style.width=Math.round(((i+1)/noImg.length)*100)+'%';
    var url=await getImg(p.name);
    if(url){p.img=url;save();}
    await new Promise(function(r){setTimeout(r,400);});
  }
  prog.style.display='none';
  refreshAll();
};

  renderProducts(q('search').value);
};

window.delProduct=function(cid,idx){

  c.deleted.push({name:p.name,su:p.su});c.products.splice(idx,1);

};

};

// ── Deleted ──
window.showDeletedModal=function(){
  var html='';
  cats.forEach(function(c){
    if(!c.deleted.length)return;
    html+='<h4 style="margin:10px 0 4px;color:#1e3a5f;">'+esc(c.name)+'</h4>';
    c.deleted.forEach(function(item,idx){
      var ul={pieces:'Τεμ',kg:'Kg',pallet:'Παλ'}[item.su]||'Τεμ';
      html+='<div class="del-item"><span><strong>'+esc(item.name)+'</strong> ('+ul+')</span>'
        +'<div style="display:flex;gap:4px;">'
        +'<button class="btn-restore" onclick="restoreProd(\''+c.id+'\','+idx+')">↩️</button>'
        +'<button class="btn-perm" onclick="permDel(\''+c.id+'\','+idx+')">🗑️</button>'
        +'</div></div>';
    });
  });
  q('delList').innerHTML=html||'<div style="text-align:center;padding:20px;">📭 Κανένα</div>';
  openModal('deletedModal');
};
window.restoreProd=function(cid,i){
  var c=cats.find(function(x){return x.id===cid;});var item=c.deleted[i];
  if(c.products.find(function(p){return p.name===item.name;})){alert('Υπάρχει ήδη.');return;}
  c.products.push({name:item.name,boxes:0,sv:0,su:item.su,img:''});
  c.deleted.splice(i,1);save();refreshAll();showDeletedModal();
};
window.permDel=function(cid,i){
  if(confirm('Οριστική διαγραφή;')){cats.find(function(x){return x.id===cid;}).deleted.splice(i,1);save();showDeletedModal();}
};

// ── PDF ──
window.exportPDF=function(){
  var all=[];cats.forEach(function(c){c.products.forEach(function(p){if(p.boxes>0||p.sv>0)all.push({cn:c.name,p:p});});});
  if(!all.length){alert('Κανένα απόθεμα.');return;}
  var gr={};all.forEach(function(x){if(!gr[x.cn])gr[x.cn]=[];gr[x.cn].push(x.p);});
  function fmt(v,u){if(v===0)return'';return(u==='kg'?v.toFixed(1):v.toFixed(0))+' '+({pieces:'τεμ.',kg:'kg',pallet:'παλ.'}[u]||'');}
  var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>THASSOS IMPERIAL</title>'
    +'<style>body{font-family:sans-serif;font-size:12px;padding:20px}h1{color:#1e3a5f;text-align:center}.dt{text-align:center;margin:4px 0 24px}'
    +'.cat{margin-top:24px}h2{background:#1e3a5f;color:white;padding:8px 12px;border-radius:8px}'
    +'table{width:100%;border-collapse:collapse}th{background:#d9e6f2;padding:8px;border:1px solid #a0bbd0}'
    +'td{border:1px solid #ccc;padding:6px}td:nth-child(2),td:nth-child(3){text-align:center}'
    +'.g{background:#d4edda!important}.th{width:40px;height:40px;object-fit:cover;border-radius:6px}'
    +'@media print{body{margin:.5cm}}</style></head><body>'
    +'<h1>THASSOS IMPERIAL</h1><div class="dt">'+new Date().toLocaleDateString('el-GR')+'</div>';
  Object.keys(gr).forEach(function(cn){
    html+='<div class="cat"><h2>'+esc(cn)+'</h2><table><thead><tr><th></th><th>Προϊόν</th><th>Κιβώτια</th><th>Ποσότητα</th></tr></thead><tbody>';
    gr[cn].forEach(function(p){
      var th=p.img?'<img class="th" src="'+esc(p.img)+'" alt="">':'';
      html+='<tr><td>'+th+'</td><td>'+esc(p.name)+'</td><td class="'+(p.boxes>0?'g':'')+'">'+(p.boxes||'')+'</td><td class="'+(p.sv>0?'g':'')+'">'+fmt(p.sv,p.su)+'</td></tr>';
    });
    html+='</tbody></table></div>';
  });
  html+='<div style="margin-top:30px;text-align:center;color:#6f8fae">THASSOS IMPERIAL</div></body></html>';
  var win=window.open('','_blank');win.document.write(html);win.document.close();win.print();
};

// ── Scroll ──
var sb=q('scrollBtn');
window.addEventListener('scroll',function(){sb.classList.toggle('vis',window.scrollY>300);});
sb.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});

// ── Start ──
refreshAll();
</script>
</body>
